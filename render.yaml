services:
  - type: web
    name: dungeons-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start -w api
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        sync: false
      - key: PORT
        value: 4000

  - type: web
    name: dungeons-web
    runtime: static
    buildCommand: npm install && npm run build -w web
    staticPublishPath: web/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
