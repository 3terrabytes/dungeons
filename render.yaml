databases:
  - name: dungeon-db
    plan: free
    databaseName: dungeon
    user: dungeon

services:
  - type: web
    name: dungeon-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dungeon-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://dungeon-crawler.onrender.com
      - key: NODE_ENV
        value: production

  - type: web
    name: dungeon-crawler
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://dungeon-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
