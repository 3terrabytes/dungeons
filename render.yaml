# Render's free PostgreSQL was discontinued in 2024.
# We use Neon (https://neon.tech) for a free Postgres instead — paste the
# connection string into the dungeon-api DATABASE_URL env var on first deploy.

services:
  - type: web
    name: dungeon-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: postgresql://neondb_owner:npg_EfL3nSU8NtYx@ep-steep-cell-abkvdmh8-pooler.eu-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require
        sync: false                                 # prompt on first deploy — paste Neon URL
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://dungeon-crawler.onrender.com
      - key: NODE_ENV
        value: production

  - type: web
    name: dungeon-crawler
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://dungeon-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
